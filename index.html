<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Munno Para">
<meta name="theme-color" content="#0D1B2A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Munno Para — AMS Security Portal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'DM Sans', sans-serif;
    background: #0D1B2A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Redirect happens instantly — this is just a splash */
  .splash {
    text-align: center;
    color: white;
  }
  .logo {
    width: 80px;
    height: 80px;
    border-radius: 18px;
    margin: 0 auto 16px;
    display: block;
  }
  p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 8px; }

  /* Install banner */
  #install-banner {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 16px;
    right: 16px;
    background: #C8973A;
    color: #0D1B2A;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 9999;
    animation: slideup 0.3s ease;
  }
  @keyframes slideup { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #install-banner img { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; }
  #install-banner .text { flex: 1; }
  #install-banner .text strong { display: block; font-size: 14px; font-weight: 700; }
  #install-banner .text span { font-size: 12px; opacity: 0.75; }
  #install-btn {
    background: #0D1B2A;
    color: white;
    border: none;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  #dismiss-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #0D1B2A;
    padding: 4px;
    flex-shrink: 0;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="splash">
  <img class="logo" src="icon-192.png" alt="AMS Security">
  <p>Loading portal...</p>
</div>

<!-- Install to home screen banner -->
<div id="install-banner" style="display:none">
  <img src="icon-192.png" alt="AMS">
  <div class="text">
    <strong>Install Munno Para Portal</strong>
    <span>Add to home screen for quick access</span>
  </div>
  <button id="install-btn">Install</button>
  <button id="dismiss-btn">✕</button>
</div>

<script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
    navigator.serviceWorker.register('firebase-messaging-sw.js').catch(() => {});
  }

  // Capture the install prompt
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Show our custom install banner
    const banner = document.getElementById('install-banner');
    banner.style.display = 'flex';
  });

  document.getElementById('install-btn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
    if (outcome === 'accepted') {
      console.log('PWA installed');
    }
  });

  document.getElementById('dismiss-btn').addEventListener('click', () => {
    document.getElementById('install-banner').style.display = 'none';
    // Remember dismissal for 7 days
    localStorage.setItem('pwa-dismissed', Date.now());
  });

  // Don't show if dismissed recently
  const dismissed = localStorage.getItem('pwa-dismissed');
  if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 60 * 60 * 1000) {
    window.removeEventListener('beforeinstallprompt', () => {});
  }

  // Already installed — redirect straight to portal
  window.addEventListener('appinstalled', () => {
    window.location.href = 'munno_para_portal.html';
  });

  // Redirect to portal after brief splash
  setTimeout(() => {
    window.location.href = 'munno_para_portal.html';
  }, 800);
</script>
</body>
</html>
